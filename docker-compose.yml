services:
  db:
    container_name: spring-db-container
    build:
      context: .
      dockerfile: images/Dockerfile.db
    image: spring-db-image
    ports:
      - "3307:3306"
    networks:
      - spring-app-network
    environment:
      - MYSQL_ROOT_PASSWORD=test1234
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ptest1234" ]
      interval: 5s
      timeout: 5s
      retries: 100

  app:
    container_name: spring-app-container
    build:
      context: .
      dockerfile: images/Dockerfile.be
    image: spring-app-image
    ports:
      - "8080:8080"
    networks:
      - spring-app-network
    environment:
      - DB_SERVICE=db
      - DB_PORT=3306
      - DB_NAME=backend_db
      - DB_USER=backend_app
      - DB_PASSWORD=test1234
    depends_on:
      db:
        condition: service_healthy

networks:
  spring-app-network: