<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

            <div class="d-flex justify-content-between">
                <div>
                    <strong class="h4">HOTEL FSK</strong>
                </div>
                <div>
                    <strong>Admin:</strong>

            </div>
        </div>
        <div class="card-body">
            <div class="d-flex flex-column align-items-center justify-content-between">
                <a th:href="@{/customers/all}"  class="btn btn-dark w-100">Customers</a>
                <hr class="w-100 border-0" style="height: 2px; background-color: #dee2e6;">
                <a th:href="@{/bookings/all}"  class="btn btn-dark w-100">Bookings</a>
            </div>
        </div>
    </div>

<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
