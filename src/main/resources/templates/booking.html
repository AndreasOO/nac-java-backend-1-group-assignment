<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Registration</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>

<!--Modal för lägga till nytt rum-->
<div class="modal fade" id="new-room-modal" tabindex="-1" role="dialog" aria-labelledby="new-room-modal" aria-hidden="true">
  <div class="modal-dialog" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="new-room-modal-title">New room</h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">

        <form th:action="@{/bookings/rooms}" method="get" class="mb-4">
          <input type="hidden" name="bookingId" th:value="${bookingId}" />
          <div class="form-group">
            <label for="questCount">Amount of quests:</label>
            <select id="questCount" name="questCount" class="form-control">
              <option value="" disabled selected>-- Choose quest count --</option>
              <option th:each="capacity : ${capacityOptions}" th:value="${capacity}" th:text="${capacity}">
            </select>
          </div>

          <div class="form-group">
            <label for="startDate">Start date:</label>
            <input type="date" id="startDate" name="startDate" class="form-control" required>
          </div>
          <div class="form-group">
            <label for="endDate">End date:</label>
            <input type="date" id="endDate" name="endDate" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-dark w-100">Show available rooms</button>
        </form>

      </div>
    </div>
  </div>
</div>

<!-- Sidan med alla rum för booking -->
<div class="container-fluid min-vh-100 d-flex justify-content-center align-items-center">
  <div class="card p-5 shadow rounded border border-light" style="width: 100%; max-width: 70%;">
    <div class="card-header bg-light">
      <div class="d-flex justify-content-between">
        <div>
          <strong>Customer:</strong>
          <span th:text="${customer.getName()}">Customer Name</span>
        </div>
        <div>
          <strong>Booking id:</strong>
          <span th:text="${bookingId}">5</span>
        </div>
      </div>
    </div>
    <table class="table">
      <thead>
      <tr>
        <th scope="col" style="width: 5%">#</th>
        <th scope="col" style="width: 10%">Room id</th>
        <th scope="col" style="width: 15%">Room type</th>
        <th scope="col" style="width: 15%">Cost/night</th>
        <th scope="col" style="width: 15%">From date</th>
        <th scope="col" style="width: 15%">To date</th>
        <th scope="col" style="width: 10%"></th>
        <th scope="col" style="width: 15%"></th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="bookedRoom, iterStat : ${bookedRooms}">
        <th scope="row" th:text="${iterStat.index + 1}">1</th>
        <td th:text="${bookedRoom.getRoom().getId()}">Room id</td>
        <td th:text="${bookedRoom.getRoom().getRoomType().getName()}">Room type</td>
        <td th:text="${bookedRoom.getRoom().getRoomType().getCostPerNight()}">Cost per night</td>
        <td th:text="${bookedRoom.getStartDate()}">Booked from</td>
        <td th:text="${bookedRoom.getEndDate()}">Booked to</td>
        <td>
          <form th:action="@{/bookings/booking/edit-room}" method="post">
            <input type="hidden" name="bookingId" th:value="${bookingId}" />
            <input type="hidden" name="roomId" th:value="${bookedRoom.getRoom().getId()}" />
            <input type="hidden" name="startDate" th:value="${bookedRoom.getStartDate()}" />
            <input type="hidden" name="endDate" th:value="${bookedRoom.getEndDate()}" />
            <button type="submit" class="btn btn-sm btn-dark">Edit room</button>
          </form>
        </td>
        <td>
          <form th:action="@{/bookings/booking/delete-room}" method="post">
            <input type="hidden" name="bookingId" th:value="${bookingId}" />
            <input type="hidden" name="roomId" th:value="${bookedRoom.getRoom().getId()}" />
            <button type="submit" class="btn btn-sm btn-dark">Delete room</button>
          </form>
        </td>
      </tr>
      </tbody>
    </table>
    <div class="d-flex flex-column align-items-center">
      <a href="#" class="btn btn-dark w-100" data-toggle="modal" data-target="#new-room-modal">Add new room to booking</a>
      <hr class="w-100 border-0" style="height: 2px; background-color: #dee2e6;">
      <a th:href="@{/bookings/all}"  class="btn btn-dark w-100">Go to bookings</a>
    </div>
  </div>
</div>
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.7/dist/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
</body>
</html>
