<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Customers</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="p-5">
<div class="container">
    <h2>Kundlista</h2>

    <button class="btn btn-sm btn-dark mb-3" data-bs-toggle="modal" data-bs-target="#addModal">Register new customer</button>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>Name</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="customer : ${customers}">
            <td th:text="${customer.name}"></td>
            <td>
                <button class="btn btn-sm btn-dark"
                        data-bs-toggle="modal"
                        th:attr="data-bs-target='#editModal__${customer.id}'">edit</button>

                <form th:action="@{/customers/delete}" method="post" style="display:inline;">
                    <input type="hidden" name="id" th:value="${customer.id}" />
                    <button type="submit" class="btn btn-sm btn-dark">Delete</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<!-- Redigera Modals -->
<div th:each="customer : ${customers}">
    <div class="modal fade" th:id="'editModal__' + ${customer.id}" tabindex="-1">
        <div class="modal-dialog">
            <form th:action="@{/customers/edit}" method="post" class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Register customer</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" name="id" th:value="${customer.id}" />
                    <input type="text" name="name" class="form-control" th:value="${customer.name}" required />
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn btn-sm btn-dark">Save</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- modal för add customer -->
<div class="modal fade" id="addModal" tabindex="-1">
    <div class="modal-dialog">
        <form th:action="@{/customers/add}" method="post" class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Register new customer</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="text" name="name" class="form-control" placeholder="Name" required />
            </div>
            <div class="modal-footer">
                <button type="submit" class="btn btn-sm btn-dark">Register new customer</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.7/dist/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
</body>
</html>
