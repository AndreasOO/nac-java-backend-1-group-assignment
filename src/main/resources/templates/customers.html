<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Customers</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="p-5">
<div class="container">
    <h2>Customers</h2>

    <a href="/customers/register" class="btn btn-sm btn-dark mb-3">Register new customer</a>
    <a href="/" class="btn btn-sm btn-dark mb-3">Home page</a>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>Name</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <tr th:each="customer : ${customers}">
            <td th:text="${customer.name}"></td>
            <td>
                <a class="btn btn-sm btn-dark" th:href="@{/customers/edit/{id}(id=${customer.id})}">Edit</a>

                <form th:action="@{/customers/delete/{id}(id=${customer.id})}" th:method="delete" style="display:inline;">
                    <input type="hidden" name="id" th:value="${customer.id}"/>
                    <button type="submit" class="btn btn-sm btn-dark">Delete</button>
                    <div th:if="${targetId} == ${customer.id}">
                        <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>
                        <div th:if="${success}" class="alert alert-success" role="alert" th:text="${success}"></div>
                    </div>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
