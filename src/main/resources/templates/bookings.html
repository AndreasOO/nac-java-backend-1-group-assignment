<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Registration</title>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>

<!-- Modal för välja kund för ny booking -->
<div class="modal fade" id="new-booking-modal" tabindex="-1" role="dialog" aria-labelledby="new-booking-modal-label" aria-hidden="true">
  <div class="modal-dialog" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="new-booking-modal-label">New Booking</h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">

        <form th:action="@{/bookings/booking}" method="post" class="mb-4">
          <div class="form-group">
            <label for="customerDTO">Choose customerDTO:</label>
            <select id="customerDTO" name="customerId" class="form-control" required>
              <option value="" disabled selected>-- Choose customer --</option>
              <option th:each="customer : ${customers}"
                      th:value="${customer.getId()}"
                      th:text="${customer.getName()}">
              </option>
            </select>
          </div>
          <button type="submit" class="btn btn-dark w-100">Next</button>
        </form>

      </div>
    </div>
  </div>
</div>

<!-- Sidan med alla bookings -->
<div class="container-fluid min-vh-100 d-flex justify-content-center align-items-center">
  <div class="card p-5 shadow rounded border border-light" style="width: 100%; max-width: 50%;">
    <div class="card-header bg-light">
      <div class="d-flex justify-content-between">
        <strong class="h5">BOOKINGS</strong>
      </div>
    </div>
    <table class="table table-hover">
      <thead>
      <tr>
        <th scope="col">#</th>
        <th scope="col">Booking id</th>
        <th scope="col">Customer id</th>
        <th scope="col">Customer name</th>
      </tr>
      </thead>
      <tbody>
      <!-- Gör hela raden klickbar, skapa ett th attribut med ett namn (data-url) och ge det url för specifik bokning, onclick hamna där -->
      <tr th:each="booking, iterStat : ${bookings}" th:attr="data-url=@{/bookings/booking(bookingId=${booking.getId()})}"
          onclick="window.location = this.getAttribute('data-url')"
          style="cursor: pointer;">
        <th scope="row" th:text="${iterStat.index + 1}">1</th>
        <td th:text="${booking.getId()}">Booking id</td>
        <td th:text="${booking.getCustomer().getId()}">Customer id</td>
        <td th:text="${booking.getCustomer().getName()}">Customer name</td>
      </tr>
      </tbody>
    </table>
    <div class="d-flex flex-column align-items-center">
      <a href="#" class="btn btn-dark w-100" data-toggle="modal" data-target="#new-booking-modal">Make new booking</a>
      <hr class="w-100 border-0" style="height: 2px; background-color: #dee2e6;">
      <!-- Länk till startsida -->
      <a th:href="@{/bookings/all}"  class="btn btn-dark w-100">Go to start-page</a>
    </div>
  </div>
</div>
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.7/dist/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
</body>
</html>
