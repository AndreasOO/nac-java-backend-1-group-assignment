<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Registration</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>
<div class="container min-vh-100 d-flex justify-content-center align-items-center">
  <div class="card p-5 shadow rounded border border-light" style="width: 100%; max-width: 600px;">
    <table class="table">
      <thead>
      <tr>
        <th scope="col">#</th>
        <th scope="col">Booking id</th>
        <th scope="col">Customer name</th>
        <th scope="col">Customer id</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="booking, iterStat : ${bookings}" th:onclick="'window.location.href=\'/bookings/booking/\' + ' + ${booking.id}" style="cursor: pointer;">
        <th scope="row" th:text="${iterStat.index + 1}">1</th>
        <td th:text="${booking.getId()}">Booking id</td>
        <td th:text="${booking.getCustomer().getName()}">Customer name</td>
        <td th:text="${booking.getCustomer().getId()}">Customer id</td>
      </tr>
      </tbody>
    </table>
    <div class="d-flex flex-column align-items-center">
      <a th:href="@{/bookings/choose-dates}" class="btn btn-dark w-100">Make new booking</a>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
</body>
</html>
