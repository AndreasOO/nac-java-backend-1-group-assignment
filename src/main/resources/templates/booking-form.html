<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Registration</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>
<div class="container min-vh-100 d-flex justify-content-center align-items-center">
  <div class="card p-5 shadow rounded border border-light" style="width: 100%; max-width: 600px;">
    <div>
      <form th:action="@{/bookings/rooms}" method="get" class="mb-4">
        <div class="form-group">
          <label for="customer">Choose customer:</label>
          <select id="customer" name="customerId" class="form-control" required>
            <option value="" disabled selected>-- Choose customer --</option>
            <option th:each="customer : ${customers}"
                    th:value="${customer.id}"
                    th:text="${customer.name}">
            </option>
          </select>
        </div>

        <div class="form-group">
          <label for="capacity">Choose room capacity:</label>
          <select id="capacity" name="capacityId" class="form-control">
            <option value="" disabled selected>-- Choose capacity --</option>
            <option th:each="capacity : ${capacityOptions}" th:value="${capacity}" th:text="${capacity}">
          </select>
        </div>

        <div class="form-group">
          <label for="startDate">Start date:</label>
          <input type="date" id="startDate" name="startDate" class="form-control" required>
        </div>
        <div class="form-group">
          <label for="endDate">End date:</label>
          <input type="date" id="endDate" name="endDate" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-dark w-100">Show available rooms</button>
      </form>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
</body>
</html>
