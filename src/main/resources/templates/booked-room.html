<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Registration</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>


<!-- Modal för välja kund för ny booking -->
<div class="modal fade" id="add-extra-modal" tabindex="-1" role="dialog" aria-labelledby="add-extra-modal-label" aria-hidden="true">
  <div class="modal-dialog" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="add-extra-modal-label">New Booking</h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">

        <form th:action="@{/bookings/booking/add-extra}" method="post" class="mb-4">
          <input type="hidden" name="bookedObjectId" th:value="${bookedObject.getId()}" />
          <div class="form-group">
            <label for="extra-type">Choose extra:</label>
            <select id="extra-type" name="extraTypeId" class="form-control" required>
              <option value="" disabled selected>-- Choose extra --</option>
              <option th:each="choice : ${extraChoices}"
                      th:value="${choice.getId()}"
                      th:text="${choice.getName()}">
              </option>
            </select>
          </div>
          <button type="submit" class="btn btn-dark w-100">Add</button>
        </form>

      </div>
    </div>
  </div>
</div>


<div class="container-fluid min-vh-100 d-flex justify-content-center align-items-center">
  <div class="card p-5 shadow rounded border border-light" style="width: 100%; max-width: 40%;">
    <div class="card-header bg-light">
      <div class="d-flex justify-content-between">
        <div>
          <strong>Booked room:</strong>
          <span th:text="${bookedObject.getRoom().getName()}">5</span>
        </div>
        <div>
          <strong>Date of booking:</strong>
          <span th:text="${bookedObject.getStartDate()}">Start date</span>
          <span> to </span>
          <span th:text="${bookedObject.getEndDate()}">End date</span>
        </div>
      </div>
    </div>
    <table class="table">
      <thead>
      <tr>
        <th scope="col" style="width: 10%">#</th>
        <th scope="col" style="width: 30%">Id</th>
        <th scope="col" style="width: 30%">Type</th>
        <th scope="col" style="width: 30%">Cost</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="extra, iterStat : ${bookedObject.getExtras()}">
        <th scope="row" th:text="${iterStat.index + 1}">1</th>
        <td th:text="${extra.getId()}">Id</td>
        <td th:text="${extra.getExtraType().getName()}">Type</td>
        <td th:text="'$' + ${extra.getExtraType().getCost()}">Cost</td>
        <td>
          <form th:action="@{/bookings/booking/delete-extra}" method="post">
            <input type="hidden" name="bookedObjectId" th:value="${bookedObject.getId()}" />
            <input type="hidden" name="extraId" th:value="${extra.getId()}" />
            <button type="submit" class="btn btn-sm btn-dark" style="width: 100%;">Delete</button>
          </form>
        </td>
      </tr>
      </tbody>
    </table>
    <a href="#" class="btn btn-dark w-100" data-toggle="modal" data-target="#add-extra-modal">Add extra</a>
    <hr class="w-100 border-0" style="height: 2px; background-color: #dee2e6;">
    <a th:href="@{/bookings/booking(bookingId=${bookedObject.getBooking().getId()})}" class="btn btn-dark w-100">Go to booking</a>
  </div>
</div>
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.7/dist/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
</body>
</html>
