<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Registration</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>
<div class="container min-vh-100 d-flex justify-content-center align-items-center">
    <div class="card p-5 shadow rounded border border-light" style="width: 100%; max-width: 600px;">
        <table class="table">
            <thead>
            <tr>
                <th scope="col">#</th>
                <th scope="col">Room id</th>
                <th scope="col">Room name</th>
                <th scope="col">Room type</th>
                <th scope="col">Extra beds available</th>
                <th scope="col">Max capacity</th>
                <th scope="col">Cost per night</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="room, iterStat : ${rooms}">
                <th scope="row" th:text="${iterStat.index + 1}">1</th>
                <td th:text="${room.getId()}">Room id</td>
                <td th:text="${room.getName()}">Room name</td>
                <td th:text="${room.getRoomType().getName()}">Room type</td>
                <td th:text="${room.getExtraBedsAvailable()}">Extra beds available</td>
                <td th:text="${room.getMaxCapacity()}">Max capacity</td>
                <td th:text="${room.getRoomType().getCostPerNight()}">Cost per night</td>
                <td>
                    <form th:action="@{/bookings/add-room}" method="post">
                        <input type="hidden" name="bookingId" th:value="${bookingId}" />
                        <input type="hidden" name="roomId" th:value="${room.getId()}" />
                        <input type="hidden" name="startDate" th:value="${startDate}" />
                        <input type="hidden" name="endDate" th:value="${endDate}" />
                        <button type="submit" class="btn btn-sm btn-dark">Add room</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
</body>
</html>
